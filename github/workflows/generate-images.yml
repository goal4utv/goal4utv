name: Generate Match Cards

# This tells GitHub WHEN to run the script
on:
  schedule:
    - cron: '0 0 * * *' # Runs automatically every day at midnight UTC
  workflow_dispatch: # Gives you a "Run" button on GitHub to trigger it manually

permissions:
  contents: write # Allows the bot to push the images to your repo

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install Pillow requests colorthief

    - name: Run image generation script
      run: python test.py

    - name: Commit and push generated images
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "Auto-generated match cards [skip ci]"
        file_pattern: "output_images/*.png"
